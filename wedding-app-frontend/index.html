  <style>
    /* Override template default loader gif */
    .fh5co-loader {
      background: #F8F5F0 !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Custom Heartbeat Loader */
    .loader {
      --dasharray: 814;
      position: relative;
      width: 100%;
      max-width: 550px;
      height: 206px;
      background: transparent none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader svg {
      position: absolute;
      width: 100%;
      max-width: 550px;
      height: auto;
    }

    .loader svg path {
      stroke-dasharray: var(--dasharray);
      -webkit-animation: heartRate 5s infinite linear forwards;
      animation: heartRate 5s infinite linear forwards;
    }

    @-webkit-keyframes heartRate {
      from {
        stroke-dashoffset: var(--dasharray);
      }

      to {
        stroke-dashoffset: calc(var(--dasharray) * -1px);
      }
    }

    @keyframes heartRate {
      from {
        stroke-dashoffset: var(--dasharray);
      }

      to {
        stroke-dashoffset: calc(var(--dasharray) * -1px);
      }
    }
  </style>
</head>
